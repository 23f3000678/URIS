name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: uris_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Backend
      DATABASE_URL:        postgresql://postgres:postgres@localhost:5432/uris_test
      JWT_SECRET:          ci_test_jwt_secret_not_for_production
      JWT_EXPIRES_IN:      1d
      FRONTEND_URL:        http://localhost:5173
      NODE_ENV:            test
      LOG_LEVEL:           warn
      # Disable external integrations in CI
      NEXTCLOUD_URL:       ""
      NEXTCLOUD_USERNAME:  ""
      NEXTCLOUD_PASSWORD:  ""
      PLANE_BASE_URL:      ""
      PLANE_API_KEY:       ""
      PLANE_WORKSPACE_SLUG: ""
      PLANE_PROJECT_ID:    ""
      # Frontend
      VITE_API_URL:        http://localhost:5000

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node setup ──────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            tests/e2e/package-lock.json

      # ── Backend setup ────────────────────────────────────────────────────────
      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        working-directory: backend

      - name: Seed test database
        run: node prisma/seed.js
        working-directory: backend

      - name: Start backend server
        run: node app.js &
        working-directory: backend

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:5000/health/live && break
            echo "Waiting for backend... ($i)"
            sleep 2
          done

      # ── Frontend setup ───────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Start frontend preview server
        run: npm run preview -- --port 5173 &
        working-directory: frontend

      - name: Wait for frontend to be ready
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:5173 && break
            echo "Waiting for frontend... ($i)"
            sleep 2
          done

      # ── Playwright setup ─────────────────────────────────────────────────────
      - name: Install E2E test dependencies
        run: npm ci
        working-directory: tests/e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: tests/e2e

      # ── Run tests ────────────────────────────────────────────────────────────
      - name: Run Playwright E2E tests
        run: npx playwright test
        working-directory: tests/e2e
        env:
          FRONTEND_URL: http://localhost:5173

      # ── Upload artifacts on failure ──────────────────────────────────────────
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 14

      - name: Upload test results (traces, screenshots, videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: tests/e2e/test-results/
          retention-days: 7
